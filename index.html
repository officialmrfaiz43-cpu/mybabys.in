<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Name Generator | mybabys.in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn-custom { background-color: #4a90e2; color: white; font-weight: bold; }
        .btn-custom:hover { background-color: #357abd; color: white; }
        .result-box { margin-top: 20px; font-size: 1.5em; font-weight: bold; color: #198754; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h3 class="mb-4">👶 NameGen</h3>
            
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <select id="religion" class="form-select">
                        <option value="hindu">Hindu</option>
                        <option value="muslim">Muslim</option>
                        <option value="christian">Christian</option>
                        <option value="modern">Modern</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <select id="gender" class="form-select">
                        <option value="boy">Boy</option>
                        <option value="girl">Girl</option>
                    </select>
                </div>
            </div>

            <button onclick="generateName()" class="btn btn-custom w-100 py-2">✨ Generate Name</button>

            <div id="result" class="result-box"></div>
        </div>
    </div>
</div>

<script>
    // Yahan humne aapka database JavaScript mein daal diya hai
    const nameDatabase = {
        "hindu": {
            "boy": ["Aarav (आरव) - Peaceful", "Vihaan (विहान) - Dawn", "Aditya (आदित्य) - The Sun"],
            "girl": ["Aadhya (आध्या) - First Power", "Kiara (कियारा) - Little dark one", "Diya (दिया) - Light"]
        },
        "muslim": {
            "boy": ["Ayaan (ایان) - Gift of God", "Zayn (زین) - Beauty, Grace", "Rehan (ریحان) - Scented"],
            "girl": ["Zara (زہرا) - Blooming Flower", "Fatima (فاطمہ) - Captivating", "Inaya (عنایہ) - Concern"]
        },
        "christian": {
            "boy": ["Ethan - Strong, Firm", "Liam - Strong-willed warrior"],
            "girl": ["Sophia - Wisdom", "Olivia - Olive Tree"]
        },
        "modern": {
            "boy": ["Aryan (आर्यन) - Noble", "Zian (ज़ियान) - Self-peace"],
            "girl": ["Ria (रिया) - Singer", "Sia (सिया) - Moving"]
        }
    };

    function generateName() {
        // Dropdown se value uthana
        let religion = document.getElementById("religion").value;
        let gender = document.getElementById("gender").value;
        
        // Database se list nikalna
        let namesList = nameDatabase[religion][gender];
        
        // List mein se random naam nikalna
        let randomIndex = Math.floor(Math.random() * namesList.length);
        let selectedName = namesList[randomIndex];
        
        // Screen par dikhana
        document.getElementById("result").innerHTML = selectedName;
    }
</script>

</body>
</html>
